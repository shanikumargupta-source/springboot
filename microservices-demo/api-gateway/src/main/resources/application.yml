spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/order
        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/payments/**
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/inventory/**

server:
  port: 8080

resilience4j:
  circuitbreaker:
    instances:
      orderService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
